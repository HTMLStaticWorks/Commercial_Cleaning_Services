<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | CleanEdge Pro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(168deg, #000000 0%, #14181e 100%);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            border-color: #e2e8f0;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        .login-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 12px;
            outline: none;
        }

        [data-theme="light"] .login-input {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        .theme-float {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .divider-line {
            background: #e2e8f0;
        }

        .social-login-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .social-btn {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        [data-theme="light"] .social-btn:hover {
            background: #e2e8f0;
        }

        .theme-float {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .theme-float .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff !important;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .theme-float .theme-toggle i {
            font-size: 1.2rem;
            color: #fff !important;
        }

        .theme-float .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-float .rtl-toggle {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff !important;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .theme-float .rtl-toggle i {
            color: #fff !important;
        }

        .theme-float .rtl-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 400px) {
            .login-card {
                padding: 30px 20px;
            }
            .auth-links {
                font-size: 0.75rem !important;
                white-space: nowrap;
            }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="shortcut icon" href="assets/images/favicon.svg">
</head>

<body data-theme="light">



    <div class="theme-float">
        <button class="rtl-toggle btn btn-outline"><i class="ri-text-direction-r"></i> RTL</button>
        <button id="theme-toggle" class="theme-toggle"><i class="ri-moon-line"></i></button>
    </div>

    <div class="login-card">
        <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 40px; font-size: 2rem;">
            <i class="ri-shield-flash-line"></i> Clean<span>Edge</span>
        </a>
        <h3 style="margin-bottom: 15px; font-size: 1.8rem; font-weight: 700;">Welcome</h3>

        <form action="dashboard.html">
            <div style="margin-bottom: 12px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600;text-align: left; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block;">Full
                    Name</label>
                <input type="text" placeholder="John Doe" required class="login-input">
            </div>
            <div style="margin-bottom: 12px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600; text-align: left;text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block;">Corporate
                    Email</label>
                <input type="email" placeholder="j.doe@company.com" required class="login-input">
            </div>
            <div style="margin-bottom: 12px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600;text-align: left; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block;">Password</label>
                <input type="password" placeholder="••••••••" required class="login-input">
            </div>

            <div class="auth-links"
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px; font-size: 0.8rem; gap: 5px;">
                <label style="display:flex; align-items:center; gap: 4px; cursor: pointer;"><input type="checkbox"> Remember Me</label>
                <a href="#" style="color: var(--secondary); font-weight: 700;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width:100%; justify-content:center; padding: 14px; background-color: var(--secondary);">Sign
                In</button>
        </form>

        <div class="social-divider">
            <div class="divider-line"></div>
            <span>or continue with</span>
            <div class="divider-line"></div>
        </div>

        <div class="social-login-grid">
            <button class="social-btn">
                <svg width="18" height="18" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor"
                        d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                </svg> Apple
            </button>
            <button class="social-btn">
                <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg> Google
            </button>

        </div>

        <p style="margin-top: 30px; font-size: 0.9rem; opacity:0.7;">
            Don't have account? <a href="signup.html" style="color: var(--secondary); font-weight: 700;">Join Us</a>
        </p>
    </div>

    <script src="assets/js/script.js"></script>
    <!-- Back to Top -->

</body>

</html>
