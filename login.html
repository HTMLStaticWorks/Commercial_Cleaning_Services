<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | CleanEdge Pro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-800) 100%);
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            border-color: #e2e8f0;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        .login-input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 20px;
            outline: none;
        }

        [data-theme="light"] .login-input {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        .theme-float {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body data-theme="light">

    <div class="theme-float">
        <button id="theme-toggle" class="theme-toggle"><i class="ri-moon-line"></i></button>
    </div>

    <div class="login-card">
        <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 40px; font-size: 2rem;">
            <i class="ri-shield-flash-line"></i> Clean<span>Edge</span>
        </a>
        <h2 style="margin-bottom: 10px;">Welcome Back</h2>
        <p style="opacity:0.7; font-size: 0.9rem; margin-bottom: 30px;">Access your facility management dashboard</p>

        <form action="dashboard.html">
            <input type="email" placeholder="Corporate Email" required class="login-input">
            <input type="password" placeholder="Password" required class="login-input">

            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px; font-size: 0.8rem;">
                <label style="display:flex; align-items:center; gap: 8px;"><input type="checkbox"> Remember for 30
                    days</label>
                <a href="#" style="color: var(--secondary); font-weight: 700;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width:100%; justify-content:center; padding: 18px;">Sign In to Portal</button>
        </form>

        <p style="margin-top: 30px; font-size: 0.9rem; opacity:0.7;">
            Don't have a corporate account? <a href="signup.html"
                style="color: var(--secondary); font-weight: 700;">Join Us</a>
        </p>
    </div>

    <script src="assets/js/script.js"></script>
</body>

</html>
