<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporation Registration | CleanEdge Pro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-800) 100%);
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            border-color: #e2e8f0;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        .login-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        [data-theme="light"] .login-input {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        .theme-float {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body data-theme="light">

    <div class="theme-float">
        <button id="theme-toggle" class="theme-toggle"><i class="ri-moon-line"></i></button>
    </div>

    <div class="login-card">
        <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 40px; font-size: 2rem;">
            <i class="ri-shield-flash-line"></i> Clean<span>Edge</span>
        </a>
        <h2 style="margin-bottom: 10px;">Corporate Access</h2>
        <p style="opacity:0.7; font-size: 0.9rem; margin-bottom: 30px;">Register your facility for premium care</p>

        <form action="dashboard.html">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" placeholder="First Name" required class="login-input">
                <input type="text" placeholder="Last Name" required class="login-input">
            </div>
            <input type="text" placeholder="Company Name" required class="login-input">
            <input type="email" placeholder="Corporate Email" required class="login-input">
            <input type="password" placeholder="Create Password" required class="login-input">

            <p style="font-size: 0.75rem; opacity: 0.7; margin: 10px 0 25px; text-align: left;">
                By clicking register, you agree to our Terms of Service & Privacy Policy.
            </p>

            <button type="submit" class="btn btn-primary"
                style="width:100%; justify-content:center; padding: 18px; background-color: var(--secondary);">Create
                Account</button>
        </form>

        <p style="margin-top: 30px; font-size: 0.9rem; opacity:0.7;">
            Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 700;">Login
                Here</a>
        </p>
    </div>

    <script src="assets/js/script.js"></script>
</body>

</html>
