<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporation Registration | CleanEdge Pro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-800) 100%);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .login-card {
            margin: auto;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            border-color: #e2e8f0;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        .login-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        [data-theme="light"] .login-input {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        .theme-float {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .divider-line {
            background: #e2e8f0;
        }

        .social-login-grid {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .social-btn {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        [data-theme="light"] .social-btn:hover {
            background: #e2e8f0;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="shortcut icon" href="assets/images/favicon.svg">
</head>

<body data-theme="light">



    <div class="login-card">
        <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 40px; font-size: 2rem;">
            <i class="ri-shield-flash-line"></i> Clean<span>Edge</span>
        </a>
        <h2 style="margin-bottom: 10px;">Join Us</h2>
        <p style="opacity:0.7; font-size: 0.9rem; margin-bottom: 30px;">Register here for premium care</p>

        <form action="dashboard.html">
            <div style="margin-bottom: 20px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block; text-align: left;">First
                    Name</label>
                <input type="text" placeholder="John" required class="login-input">
            </div>
            <div style="margin-bottom: 20px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block; text-align: left;">Last
                    Name</label>
                <input type="text" placeholder="Doe" required class="login-input">
            </div>
            <div style="margin-bottom: 20px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block; text-align: left;">Company
                    Name</label>
                <input type="text" placeholder="Acme Inc" required class="login-input">
            </div>
            <div style="margin-bottom: 20px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block; text-align: left;">Corporate
                    Email</label>
                <input type="email" placeholder="j.doe@company.com" required class="login-input">
            </div>
            <div style="margin-bottom: 20px;">
                <label
                    style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; display: block; text-align: left;">Create
                    Password</label>
                <input type="password" placeholder="••••••••" required class="login-input">
            </div>
            <label
                style="display:flex; align-items:flex-start; gap: 8px; font-size: 0.75rem; opacity: 0.7; margin: 10px 0 25px; text-align: left; cursor: pointer;">
                <input type="checkbox" required style="margin-top: 2px;">
                <span>By clicking register, you agree to our Terms of Service & Privacy Policy.</span>
            </label>

            <button type="submit" class="btn btn-primary"
                style="width:100%; justify-content:center; padding: 18px; background-color: var(--secondary);">Create
                Account</button>
        </form>

        <div class="social-divider">
            <div class="divider-line"></div>
            <span>or continue with</span>
            <div class="divider-line"></div>
        </div>

        <div class="social-login-grid">
            <button class="social-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg> Google
            </button>
            <button class="social-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#F25022" d="M1 1h10v10H1z" />
                    <path fill="#00A4EF" d="M13 1h10v10H13z" />
                    <path fill="#7FBA00" d="M1 13h10v10H1z" />
                    <path fill="#FFB900" d="M13 13h10v10H13z" />
                </svg> Microsoft
            </button>
        </div>

        <p style="margin-top: 30px; font-size: 0.9rem; opacity:0.7;">
            Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 700;">Login
                Here</a>
        </p>
    </div>

    <script src="assets/js/script.js"></script>
    <!-- Back to Top -->
    <a href="#" class="back-to-top" id="backToTop">
        <i class="ri-arrow-up-line"></i>
    </a>
</body>

</html>
