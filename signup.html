<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporation Registration | CleanEdge Pro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-800) 100%);
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            border-color: #e2e8f0;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        .login-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        [data-theme="light"] .login-input {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        .theme-float {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .divider-line {
            background: #e2e8f0;
        }

        .social-login-grid {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .social-btn {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: var(--text-primary);
        }

        [data-theme="light"] .social-btn:hover {
            background: #e2e8f0;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="shortcut icon" href="assets/images/favicon.svg">
</head>

<body data-theme="light">



    <div class="login-card">
        <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 40px; font-size: 2rem;">
            <i class="ri-shield-flash-line"></i> Clean<span>Edge</span>
        </a>
        <h2 style="margin-bottom: 10px;">Join Us</h2>
        <p style="opacity:0.7; font-size: 0.9rem; margin-bottom: 30px;">Register here for premium care</p>

        <form action="dashboard.html">
            <input type="text" placeholder="First Name" required class="login-input">
            <input type="text" placeholder="Last Name" required class="login-input">
            <input type="text" placeholder="Company Name" required class="login-input">
            <input type="email" placeholder="Corporate Email" required class="login-input">
            <input type="password" placeholder="Create Password" required class="login-input">

            <label style="display:flex; align-items:flex-start; gap: 8px; font-size: 0.75rem; opacity: 0.7; margin: 10px 0 25px; text-align: left; cursor: pointer;">
                <input type="checkbox" required style="margin-top: 2px;">
                <span>By clicking register, you agree to our Terms of Service & Privacy Policy.</span>
            </label>

            <button type="submit" class="btn btn-primary"
                style="width:100%; justify-content:center; padding: 18px; background-color: var(--secondary);">Create
                Account</button>
        </form>

        <div class="social-divider">
            <div class="divider-line"></div>
            <span>or continue with</span>
            <div class="divider-line"></div>
        </div>

        <div class="social-login-grid">
            <button class="social-btn">
                <i class="ri-google-fill" style="color: #DB4437; font-size: 1.2rem;"></i> Google
            </button>
            <button class="social-btn">
                <i class="ri-microsoft-fill" style="color: #00A4EF; font-size: 1.2rem;"></i> Microsoft
            </button>
        </div>

        <p style="margin-top: 30px; font-size: 0.9rem; opacity:0.7;">
            Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 700;">Login
                Here</a>
        </p>
    </div>

    <script src="assets/js/script.js"></script>
    <!-- Back to Top -->
    <a href="#" class="back-to-top" id="backToTop">
        <i class="ri-arrow-up-line"></i>
    </a>
</body>

</html>
